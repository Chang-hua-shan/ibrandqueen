<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Crown Path -->
  <path d="M20 75 L15 35 L38 52 L50 20 L62 52 L85 35 L80 75 Z" fill="url(#gold-grad)" filter="url(#glow)" />
  <!-- Base arch -->
  <path d="M20 78 Q50 84 80 78" stroke="url(#gold-grad)" stroke-width="4" fill="none" stroke-linecap="round" />
  <!-- Dots on peaks -->
  <circle cx="15" cy="33" r="3" fill="#ffffff" />
  <circle cx="50" cy="18" r="4" fill="#ffffff" />
  <circle cx="85" cy="33" r="3" fill="#ffffff" />
</svg>
